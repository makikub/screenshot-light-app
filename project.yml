name: ScreenshotApp

options:
  bundleIdPrefix: com.masakikubota
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: L98U958G2N

targets:
  ScreenshotApp:
    type: application
    platform: macOS
    sources:
      - path: ScreenshotApp
        excludes:
          - "*.plist"
          - "*.entitlements"
    info:
      path: ScreenshotApp/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Screenshot
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "2"
        NSScreenCaptureUsageDescription: "スクリーンショットを撮影するためにアクセスが必要です"
        SUFeedURL: "https://raw.githubusercontent.com/makikub/screenshot-light-app/main/appcast.xml"
        SUPublicEDKey: "HprDdsNj+cvgNTaqa1hMbEBx3HDs0z7w1P9F5XyKxtE="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    entitlements:
      path: ScreenshotApp/ScreenshotApp.entitlements
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.masakikubota.screenshot
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_NAME: ScreenshotApp
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
        Release:
          CODE_SIGN_IDENTITY: Developer ID Application
          CODE_SIGN_STYLE: Manual
